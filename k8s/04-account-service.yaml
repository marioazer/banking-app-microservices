
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: your-docker-registry/account-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: banking-global-config
            - secretRef:
                name: banking-db-secret
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: account-service
  ports:
    - port: 8080
      targetPort: 8080