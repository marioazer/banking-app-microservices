# audit-service has no public REST API (see AuditLogRepository/ProfileAuditListener) -
# it only consumes Kafka events, so it's not routed via the ingress.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: your-docker-registry/audit-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: banking-global-config
            - secretRef:
                name: banking-db-secret
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.banking-app.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
    - port: 8080
      targetPort: 8080
