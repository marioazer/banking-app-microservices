apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
          image: your-docker-registry/profile-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: banking-global-config
            - secretRef:
                name: banking-db-secret
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.banking-app.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: profile-service
  ports:
    - port: 8080
      targetPort: 8080
