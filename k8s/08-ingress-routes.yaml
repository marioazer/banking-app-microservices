apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-ingress
  namespace: banking-app
  annotations:
    kubernetes.io/ingress.class: "nginx"

spec:
  rules:
    - http:
        paths:
          # 1. Auth traffic (login/2FA/refresh/logout - see AuthController)
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8080

          # 2. Account Traffic
          - path: /api/v1/accounts
            pathType: Prefix
            backend:
              service:
                name: account-service
                port:
                  number: 8080

          # 3. Transaction Traffic
          - path: /api/v1/transactions
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8080

          # 4. Transfer Traffic (TransferController lives inside transaction-service,
          # there is no separate transfer-service deployment)
          - path: /api/v1/transfers
            pathType: Prefix
            backend:
              service:
                name: transaction-service
                port:
                  number: 8080

          # 5. Profile Traffic (ProfileController / PreferenceController)
          - path: /api/v1/profiles
            pathType: Prefix
            backend:
              service:
                name: profile-service
                port:
                  number: 8080
