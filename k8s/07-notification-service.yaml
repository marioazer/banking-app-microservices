apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: your-docker-registry/notification-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.banking-app.svc.cluster.local:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080