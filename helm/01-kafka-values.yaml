#kafka broker configuration

replicaCount: 1

heapOpts: "-Xmx512m -Xms512m"

extraEnvVars:
  - name:  KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
    value: "true"

listeners:
  client:
    containerPort: 9092
    protocol: PLAINTEXT

persistence:
  enabled: true
  size: 8Gi
  accessModes:
    - ReadWriteOnce

resources: 
  requests:
    cpu: 250m
    memory: 512Mi

  limits:
    cpu: 500m
    memory: 1024Mi

zookeeper:
  enabled: true
  replicaCount: 1
  persistence:
    enabled: true
    size: 4Gi 
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

    limits:
      cpu: 250m
      memory: 512Mi
