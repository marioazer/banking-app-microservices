name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service_dir:
          - 01-auth-service
          - 02-profile-service
          - 03-account-service
          - 03-transaction-service
          - 04-notification-service
          - 05-audit-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        working-directory: ${{ matrix.service_dir }}
        run: ./mvnw test -B
